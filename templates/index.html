<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doi Chieu ACH</title>
<!-- socket.io phuc vu noi bo, khong can internet -->
<script src="/static/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 36px 40px 32px;
    width: 100%;
    max-width: 700px;
  }
  h1 { color: #1a56a0; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 28px; }

  .field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .field-row label { font-size: 14px; color: #374151; white-space: nowrap; }
  .field-row input[type=date] {
    padding: 7px 12px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 14px; width: 160px;
    cursor: pointer;
  }
  .field-row small { color: #9ca3af; font-size: 12px; }

  #dropzone {
    border: 2.5px dashed #93c5fd;
    border-radius: 12px;
    padding: 50px 20px 44px;
    text-align: center;
    cursor: pointer;
    background: #f0f7ff;
    transition: background .15s, border-color .15s;
    user-select: none;
  }
  #dropzone:hover, #dropzone.drag-over { background: #dbeafe; border-color: #3b82f6; }
  #dropzone .icon { font-size: 42px; margin-bottom: 12px; }
  #dropzone .main-text { font-size: 16px; color: #1e40af; font-weight: 600; }
  #dropzone .sub-text  { font-size: 13px; color: #6b7280; margin-top: 6px; }
  #file-count { font-size: 12px; color: #059669; margin-top: 8px; font-weight: 600; display: none; }
  #browser-note { font-size: 11px; color: #9ca3af; margin-top: 8px; text-align: center; }

  #status-bar { margin-top: 20px; display: none; align-items: center; gap: 10px; }
  #status-bar.visible { display: flex; }
  #progress-wrap { margin-top: 10px; display: none; }
  #progress-wrap.visible { display: block; }
  #stage-text { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
  #progress-track { background: #e5e7eb; border-radius: 6px; height: 8px; overflow: hidden; }
  #progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: width .4s ease; }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid #bfdbfe; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text { font-size: 13px; color: #374151; }

  #log {
    background: #111827; color: #d1fae5;
    padding: 14px 16px; border-radius: 10px;
    height: 400px; overflow-y: auto;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12.5px; margin-top: 18px; line-height: 1.55; display: none;
  }
  #log.visible { display: block; }
  #log .line-err  { color: #fca5a5; }
  #log .line-done { color: #86efac; font-weight: 600; }
  #log .line-csv  { color: #fcd34d; }

  #download-section { margin-top: 20px; display: none; }
  #download-section.visible { display: block; }
  #download-section h3 { font-size: 14px; color: #374151; margin-bottom: 10px; }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; background: #1a56a0; color: #fff;
    border: none; border-radius: 7px; font-size: 14px; cursor: pointer;
    text-decoration: none; margin-right: 8px; margin-bottom: 8px;
    transition: background .15s;
  }
  .dl-btn:hover { background: #1e40af; }
  .dl-btn.csv-btn { background: #059669; }
  .dl-btn.csv-btn:hover { background: #047857; }

  #reset-btn {
    margin-top: 16px; padding: 8px 18px;
    background: #f3f4f6; color: #374151;
    border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; cursor: pointer;
  }
  #reset-btn:hover { background: #e5e7eb; }

  .upload-btn {
    display: inline-block; margin-top: 14px;
    padding: 9px 22px; background: #1a56a0; color: #fff;
    border: none; border-radius: 7px; font-size: 14px; cursor: pointer;
    transition: background .15s;
  }
  .upload-btn:hover { background: #1e40af; }
  .upload-btn:disabled { background: #9ca3af; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <h1>Doi Chieu ACH</h1>
  <p class="subtitle">GL02 (NPO) vs MIS — Upload folder du lieu, nhan ket qua tu dong</p>

  <div class="field-row">
    <label>Ngay doi chieu:</label>
    <input type="date" id="ngay">
    <small id="ngay-hint" style="color:#9ca3af;font-size:12px;"></small>
  </div>

  <!-- Zone keo tha -->
  <div id="dropzone">
    <div class="icon">&#128193;</div>
    <div class="main-text">Keo tha FOLDER du lieu vao day</div>
    <div class="sub-text">hoac click nut ben duoi de chon folder / file</div>
    <div id="file-count"></div>
  </div>

  <!-- Nut chon folder / chon file rieng le -->
  <div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <button class="upload-btn" onclick="document.getElementById('folderInput').click()">
      &#128193; Chon Folder
    </button>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()"
            style="background:#374151;">
      &#128196; Chon File le
    </button>
    <button class="upload-btn" id="sendBtn" onclick="sendFiles()" disabled
            style="background:#059669;">
      &#9654; Xu ly
    </button>
    <input type="file" id="folderInput" webkitdirectory multiple style="display:none">
    <input type="file" id="fileInput"   multiple           style="display:none">
  </div>

  <div id="browser-note">
    Keo tha folder: ho tro Chrome va Edge. Firefox dung nut "Chon Folder".
  </div>

  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Dang xu ly...</span>
  </div>

  <div id="progress-wrap">
    <div id="stage-text">Khoi dong...</div>
    <div id="progress-track"><div id="progress-bar"></div></div>
  </div>

  <div id="log"></div>

  <div id="download-section">
    <h3>Tai ket qua:</h3>
    <div id="dl-buttons"></div>
    <button id="reset-btn" onclick="resetUI()">Xu ly file moi</button>
  </div>
</div>

<script>
  // --- Gioi han ngay khong duoc chon tuong lai ---
  (function() {
    const inp = document.getElementById('ngay');
    const today = new Date();
    // yyyy-mm-dd (dinh dang HTML date input)
    const ymd = today.getFullYear() + '-'
      + String(today.getMonth()+1).padStart(2,'0') + '-'
      + String(today.getDate()).padStart(2,'0');
    // KHONG tu dien ngay hom nay — de trong de server tu dong phat hien tu ten file PDF
    inp.max = ymd;  // khong cho chon tuong lai
    document.getElementById('ngay-hint').textContent =
      'De trong → tu dong phat hien tu file PDF. Hoac tu nhap neu can ghi de.';
  })();

  // --- SocketIO ---
  const socket       = io({ transports: ['websocket', 'polling'] });
  const logEl        = document.getElementById('log');
  const statusBar    = document.getElementById('status-bar');
  const statusText   = document.getElementById('status-text');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar');
  const stageText    = document.getElementById('stage-text');
  const dlSection    = document.getElementById('download-section');
  const dlButtons    = document.getElementById('dl-buttons');
  const fileCount    = document.getElementById('file-count');
  const sendBtn      = document.getElementById('sendBtn');

  // Cac moc tien trinh dua tren ky hieu trong log message
  const STAGE_MAP = [
    { marker: 'Tim thay: GL02',  pct: 8,  label: 'Tim file du lieu...' },
    { marker: '[B1]',            pct: 10, label: 'B1: Doc Session ID...' },
    { marker: '[B2]',            pct: 32, label: 'B2: Xu ly GL02 (NPO)...' },
    { marker: '[B3]',            pct: 40, label: 'B3: Xu ly GW...' },
    { marker: '[B6]',            pct: 48, label: 'B6: Xu ly MIS_DEN...' },
    { marker: '[B4] Doc',        pct: 55, label: 'B4: Doc MIS_DI (giai doan dai nhat)...' },
    { marker: '[B4] MIS_DI',    pct: 68, label: 'B4: Hoan thanh MIS_DI...' },
    { marker: '[B5]',            pct: 74, label: 'B5: Doi chieu DI...' },
    { marker: '[B7]',            pct: 78, label: 'B7: Doi chieu DEN...' },
    { marker: '[EXCEL] (1/',     pct: 80, label: 'Ghi ket qua...' },
    { marker: '[EXCEL] (4/',     pct: 86, label: 'Ghi ket qua...' },
    { marker: '[EXCEL] (7/',     pct: 92, label: 'Ghi ket qua...' },
    { marker: '[DONE] Excel',    pct: 97, label: 'Hoan tat...' },
    { marker: 'Hoan thanh:',     pct: 100, label: 'Hoan thanh!' },
  ];

  function setProgress(pct, label) {
    progressBar.style.width = pct + '%';
    if (label) stageText.textContent = label;
    if (pct >= 100) progressBar.style.background = '#059669';
    currentPct = pct;
  }

  function updateProgress(msg) {
    for (const s of STAGE_MAP) {
      if (msg.includes(s.marker)) {
        // Chi tien ve phia truoc, khong giat lui (quan trong khi cac stage chay song song)
        if (s.pct >= currentPct) setProgress(s.pct, s.label);
        break;
      }
    }
  }

  let currentJobId = '';
  let pendingFiles = [];   // files chon/drop, cho den khi bam Xu ly
  let currentPct   = 0;   // giu lai % hien tai de tranh progress giat lui

  function addLog(msg, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  socket.on('connect',    () => addLog('[OK] Ket noi server thanh cong.'));
  socket.on('disconnect', () => addLog('[!] Mat ket noi server.', 'line-err'));

  socket.on('log', d => {
    if (d.job_id !== currentJobId) return;
    const cls = d.msg.includes('[CSV]')  ? 'line-csv'
              : d.msg.includes('LOI') || d.msg.includes('Error') ? 'line-err' : '';
    addLog(d.msg, cls);
    statusText.textContent = d.msg.replace(/^\[.*?\]\s*/, '');
    updateProgress(d.msg);
  });

  socket.on('done', d => {
    if (d.job_id !== currentJobId) return;
    addLog('HOAN THANH!', 'line-done');
    setProgress(100, 'Hoan thanh!');
    statusBar.classList.remove('visible');
    dlSection.classList.add('visible');
    dlButtons.innerHTML = '';
    (d.files || []).forEach(f => {
      const isCSV = f.name.endsWith('.csv');
      const a = document.createElement('a');
      a.className = 'dl-btn' + (isCSV ? ' csv-btn' : '');
      a.href = f.url;
      a.download = f.name;
      a.innerHTML = (isCSV ? '&#128196;' : '&#128202;') + ' ' + f.name;
      dlButtons.appendChild(a);
    });
  });

  socket.on('job_error', d => {
    if (d.job_id !== currentJobId) return;
    addLog('LOI: ' + d.msg, 'line-err');
    statusBar.classList.remove('visible');
    progressWrap.classList.remove('visible');
  });

  // --- Lay file tu DataTransferItem (folder drag tu Explorer) ---
  function getFilesFromEntry(entry) {
    return new Promise(resolve => {
      if (entry.isFile) {
        entry.file(f => {
          // Gan webkitRelativePath de server biet duong dan
          try { Object.defineProperty(f, 'webkitRelativePath', { value: entry.fullPath.slice(1), configurable: true }); } catch(e){}
          resolve([f]);
        }, () => resolve([]));
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const results = [];
        function readBatch() {
          reader.readEntries(async entries => {
            if (!entries.length) return resolve(results);
            const nested = await Promise.all(entries.map(e => getFilesFromEntry(e)));
            nested.forEach(arr => results.push(...arr));
            readBatch();  // co the co nhieu batch (gioi han 100 items/lan)
          }, () => resolve(results));
        }
        readBatch();
      } else {
        resolve([]);
      }
    });
  }

  function setFiles(files) {
    pendingFiles = [...files].filter(f => f.size > 0);
    if (pendingFiles.length === 0) {
      fileCount.style.display = 'none';
      sendBtn.disabled = true;
      return;
    }
    fileCount.textContent = 'Da chon ' + pendingFiles.length + ' file. Bam "Xu ly" de bat dau.';
    fileCount.style.display = 'block';
    sendBtn.disabled = false;
  }

  // --- Xu ly khi bam nut "Xu ly" ---
  function sendFiles() {
    if (!pendingFiles.length) return;
    resetUI(false);
    logEl.classList.add('visible');
    statusBar.classList.add('visible');
    progressWrap.classList.add('visible');
    progressBar.style.background = '#3b82f6';
    setProgress(2, 'Dang tai len file...');
    addLog('Dang tai len ' + pendingFiles.length + ' file...');

    const fd   = new FormData();
    // Chuyen yyyy-mm-dd (HTML) sang dd/mm/yyyy (server)
    const raw = document.getElementById('ngay').value;
    if (raw) {
      const [y, m, d] = raw.split('-');
      fd.append('ngay_doi_chieu', `${d}/${m}/${y}`);
    }
    for (const f of pendingFiles) {
      fd.append('files', f, f.webkitRelativePath || f.name);
    }

    fetch('/upload', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        if (data.error) { addLog('LOI: ' + data.error, 'line-err'); return; }
        currentJobId = data.job_id;
        addLog('[' + data.job_id + '] Da tai len. Bat dau xu ly...');
      })
      .catch(e => addLog('Loi ket noi: ' + e, 'line-err'));
  }

  function resetUI(clearFiles) {
    if (clearFiles === undefined) clearFiles = true;
    currentJobId = '';
    logEl.innerHTML = '';
    logEl.classList.remove('visible');
    statusBar.classList.remove('visible');
    progressWrap.classList.remove('visible');
    progressBar.style.width = '0%';
    progressBar.style.background = '#3b82f6';
    currentPct = 0;
    stageText.textContent = 'Khoi dong...';
    dlSection.classList.remove('visible');
    dlButtons.innerHTML = '';
    if (clearFiles) {
      pendingFiles = [];
      fileCount.style.display = 'none';
      sendBtn.disabled = true;
      document.getElementById('folderInput').value = '';
      document.getElementById('fileInput').value = '';
    }
  }

  // --- Keo tha folder tu Explorer ---
  const zone = document.getElementById('dropzone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault();
    zone.classList.remove('drag-over');

    const items = e.dataTransfer.items;
    if (items && items.length && items[0].webkitGetAsEntry) {
      // Su dung FileSystem API de doc ca folder (Chrome/Edge)
      addLog('Dang quet folder...'); logEl.classList.add('visible');
      const all = [];
      const promises = [];
      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry();
        if (entry) promises.push(getFilesFromEntry(entry).then(fs => all.push(...fs)));
      }
      await Promise.all(promises);
      logEl.innerHTML = '';
      setFiles(all);
    } else {
      // Fallback: chi nhan file don le
      setFiles(e.dataTransfer.files);
    }
  });

  // --- Chon folder bang input ---
  document.getElementById('folderInput').addEventListener('change', e => setFiles(e.target.files));
  document.getElementById('fileInput').addEventListener('change',   e => setFiles(e.target.files));
</script>
</body>
</html>
