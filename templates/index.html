<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doi Chieu ACH</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 36px 40px 32px;
    width: 100%;
    max-width: 700px;
  }
  h1 {
    color: #1a56a0;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #6b7280;
    font-size: 13px;
    margin-bottom: 28px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .field-row label { font-size: 14px; color: #374151; white-space: nowrap; }
  .field-row input[type=text] {
    padding: 7px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    width: 160px;
  }
  .field-row small { color: #9ca3af; font-size: 12px; }

  #dropzone {
    border: 2.5px dashed #93c5fd;
    border-radius: 12px;
    padding: 50px 20px 44px;
    text-align: center;
    cursor: pointer;
    background: #f0f7ff;
    transition: background .15s, border-color .15s;
    user-select: none;
  }
  #dropzone:hover, #dropzone.drag-over {
    background: #dbeafe;
    border-color: #3b82f6;
  }
  #dropzone .icon { font-size: 42px; margin-bottom: 12px; }
  #dropzone .main-text { font-size: 16px; color: #1e40af; font-weight: 600; }
  #dropzone .sub-text  { font-size: 13px; color: #6b7280; margin-top: 6px; }
  #browser-note        { font-size: 11px; color: #9ca3af; margin-top: 8px; text-align: center; }

  #status-bar {
    margin-top: 20px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  #status-bar.visible { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid #bfdbfe;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text { font-size: 13px; color: #374151; }

  #log {
    background: #111827;
    color: #d1fae5;
    padding: 14px 16px;
    border-radius: 10px;
    height: 240px;
    overflow-y: auto;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12.5px;
    margin-top: 18px;
    line-height: 1.55;
    display: none;
  }
  #log.visible { display: block; }
  #log .line-err  { color: #fca5a5; }
  #log .line-done { color: #86efac; font-weight: 600; }
  #log .line-csv  { color: #fcd34d; }

  #download-section {
    margin-top: 20px;
    display: none;
  }
  #download-section.visible { display: block; }
  #download-section h3 { font-size: 14px; color: #374151; margin-bottom: 10px; }
  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    background: #1a56a0;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    margin-right: 8px;
    margin-bottom: 8px;
    transition: background .15s;
  }
  .dl-btn:hover { background: #1e40af; }
  .dl-btn.csv-btn { background: #059669; }
  .dl-btn.csv-btn:hover { background: #047857; }

  #reset-btn {
    margin-top: 16px;
    padding: 8px 18px;
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
  }
  #reset-btn:hover { background: #e5e7eb; }
</style>
</head>
<body>
<div class="container">
  <h1>Doi Chieu ACH</h1>
  <p class="subtitle">GL02 (NPO) vs MIS — Upload folder du lieu va nhan ket qua tu dong</p>

  <div class="field-row">
    <label>Ngay doi chieu:</label>
    <input type="text" id="ngay" placeholder="dd/mm/yyyy">
    <small>(de trong = lay tu config.py)</small>
  </div>

  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📂</div>
    <div class="main-text">Keo tha folder vao day</div>
    <div class="sub-text">hoac click de chon file</div>
    <input type="file" id="fileInput" multiple webkitdirectory style="display:none">
  </div>
  <div id="browser-note">
    Keo tha folder: chi ho tro Chrome va Edge. Firefox dung nut click de chon file.
  </div>

  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Dang xu ly...</span>
  </div>

  <div id="log"></div>

  <div id="download-section">
    <h3>Tai ket qua:</h3>
    <div id="dl-buttons"></div>
    <button id="reset-btn" onclick="resetUI()">Xu ly file moi</button>
  </div>
</div>

<script>
  const socket      = io({ transports: ['websocket', 'polling'] });
  const logEl       = document.getElementById('log');
  const statusBar   = document.getElementById('status-bar');
  const statusText  = document.getElementById('status-text');
  const dlSection   = document.getElementById('download-section');
  const dlButtons   = document.getElementById('dl-buttons');

  let currentJobId = '';

  function addLog(msg, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  socket.on('log', d => {
    if (d.job_id !== currentJobId) return;
    const cls = d.msg.includes('[CSV]') ? 'line-csv'
              : d.msg.includes('LOI') || d.msg.includes('Error') ? 'line-err'
              : '';
    addLog(d.msg, cls);
    statusText.textContent = d.msg.replace(/^\[.*?\]\s*/, '').substring(0, 80);
  });

  socket.on('done', d => {
    if (d.job_id !== currentJobId) return;
    addLog('HOAN THANH!', 'line-done');
    statusBar.classList.remove('visible');
    dlSection.classList.add('visible');
    dlButtons.innerHTML = '';
    (d.files || []).forEach(f => {
      const isCSV = f.name.endsWith('.csv');
      const a = document.createElement('a');
      a.className = 'dl-btn' + (isCSV ? ' csv-btn' : '');
      a.href = f.url;
      a.download = f.name;
      a.innerHTML = (isCSV ? '📄' : '📊') + ' ' + f.name;
      dlButtons.appendChild(a);
    });
  });

  socket.on('error', d => {
    if (d.job_id !== currentJobId) return;
    addLog('LOI: ' + d.msg, 'line-err');
    statusBar.classList.remove('visible');
    statusText.textContent = '';
  });

  function uploadFiles(files) {
    if (!files || !files.length) return;

    resetUI();
    logEl.classList.add('visible');
    statusBar.classList.add('visible');
    addLog('Dang tai len ' + files.length + ' file...');

    const fd   = new FormData();
    const ngay = document.getElementById('ngay').value.trim();
    if (ngay) fd.append('ngay_doi_chieu', ngay);
    for (const f of files) {
      fd.append('files', f, f.webkitRelativePath || f.name);
    }

    fetch('/upload', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        if (data.error) { addLog('LOI: ' + data.error, 'line-err'); return; }
        currentJobId = data.job_id;
        addLog('[' + data.job_id + '] Da tai len. Bat dau xu ly...');
      })
      .catch(e => addLog('Loi ket noi: ' + e, 'line-err'));
  }

  function resetUI() {
    currentJobId = '';
    logEl.innerHTML = '';
    logEl.classList.remove('visible');
    statusBar.classList.remove('visible');
    dlSection.classList.remove('visible');
    dlButtons.innerHTML = '';
    document.getElementById('fileInput').value = '';
  }

  // Drag and drop
  const zone = document.getElementById('dropzone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    uploadFiles([...e.dataTransfer.files]);
  });

  // Click chon file
  document.getElementById('fileInput').addEventListener('change', e => {
    uploadFiles([...e.target.files]);
  });
</script>
</body>
</html>
